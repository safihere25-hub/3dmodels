<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <div class="header">
                <h1>My Tasks</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add</button>
                </div>
                <div class="stats">
                    <span id="totalTasks" class="stat-item">Total: 0</span>
                    <span id="completedTasks" class="stat-item">Completed: 0</span>
                </div>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <p>📝 No tasks yet. Add one to get started!</p>
            </div>

            <div class="actions-section">
                <button id="clearCompleted" class="clear-btn">Clear Completed</button>
                <button id="clearAll" class="clear-all-btn">Clear All Tasks</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
